name: Content Discovery Agent

on:
  # Triggered by external cron service to avoid GitHub's 60-day inactivity limit
  repository_dispatch:
    types: [scheduled-run]
  
  # Manual trigger
  workflow_dispatch:
  
  # Weekly schedule (backup - may be disabled after 60 days)
  schedule:
    - cron: '0 10 * * 1'  # Every Monday at 10:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  discover-and-generate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Validate configuration
        run: |
          python -c "from scripts.config import Config; c = Config(); errors = c.validate(); exit(1 if errors else 0)"
      
      - name: Run content discovery agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -m scripts.agent
      
      - name: Upload agent logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-logs
          path: |
            .agent-state/
          retention-days: 30
      
      - name: Report status
        if: always()
        run: |
          if [ -f .agent-state/state.json ]; then
            echo "## Agent Run Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Last run: $(jq -r .last_run .agent-state/state.json)" >> $GITHUB_STEP_SUMMARY
            echo "Sources processed: $(jq '.sources | length' .agent-state/state.json)" >> $GITHUB_STEP_SUMMARY
          fi
